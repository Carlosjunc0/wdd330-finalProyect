<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RSVP Confirmation | Luvia Design</title>
    <meta name="description" content="Confirm your attendance to the upcoming event.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header class="main-header">
        <div class="logo-container">
            <a href="index.html" class="logo-text">Luvia Design</a>
        </div>
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="main-nav">
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
            <span class="hamburger-line"></span>
        </button>
        <nav id="main-nav" aria-label="Main Navigation">
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="invitation.html">Create</a></li>
                <li><a href="rsvp.html" aria-current="page">RSVP</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content" class="wrapper">
        <div class="text-center">
            <h1>Confirm Your Attendance</h1>
            <p style="margin-bottom: 2rem;">Please fill out the form below to let the hosts know if you can make it.</p>
        </div>

        <section class="form-section">
            <form id="rsvp-form" novalidate>
                <div class="form-group">
                    <label for="guestName">Full Name</label>
                    <input type="text" id="guestName" name="guestName" required placeholder="John Doe">
                    <span class="error-message" id="guestNameError" aria-live="polite"></span>
                </div>

                <div class="form-group">
                    <label for="guestEmail">Email Address</label>
                    <input type="email" id="guestEmail" name="guestEmail" required placeholder="john@example.com">
                    <span class="error-message" id="guestEmailError" aria-live="polite"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="attendanceStatus">Will you attend?</label>
                        <select id="attendanceStatus" name="attendanceStatus" required style="padding: 0.8rem; border: 2px solid #e2e8f0; border-radius: 8px; font-family: var(--font-body);">
                            <option value="">-- Select an option --</option>
                            <option value="yes">Joyfully Accept</option>
                            <option value="no">Regretfully Decline</option>
                        </select>
                        <span class="error-message" id="attendanceError" aria-live="polite"></span>
                    </div>
                    <div class="form-group">
                        <label for="guestCount">Number of Guests</label>
                        <input type="number" id="guestCount" name="guestCount" min="1" max="10" value="1" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary full-width">Send Confirmation</button>
                <p id="success-message" style="display: none; color: var(--primary-color); font-weight: 600; margin-top: 1rem; text-align: center;">Thank you! Your RSVP has been saved successfully.</p>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-bottom">
            <p>&copy; <span id="current-year"></span> Luvia Design. WDD 330 Final Project.</p>
        </div>
    </footer>

    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/rsvp.js"></script>
</body>
</html>
